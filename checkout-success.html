<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Order confirmed · BMS Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family:Inter,system-ui,sans-serif; color:#142318; background:radial-gradient(120% 100% at 50% 0%,#C6ECD4 0%,#EFF8F2 48%,#fff 100%); }
    .card { width:min(100%,590px); padding:42px; border:1px solid #D9E8DF; border-radius:22px; background:rgba(255,255,255,.96); box-shadow:0 24px 70px -38px rgba(12,55,36,.5); text-align:center; }
    .icon { width:58px; height:58px; display:grid; place-items:center; margin:0 auto 22px; border-radius:50%; color:#fff; background:#1C6B42; font-size:28px; font-weight:800; }
    h1 { margin:0 0 12px; font-size:clamp(28px,6vw,40px); letter-spacing:-.04em; }
    p { margin:0; color:#5F7066; line-height:1.65; }
    .status { margin:24px 0; padding:15px; border-radius:12px; background:#F1F7F3; color:#24583B; font-size:14px; font-weight:600; }
    .downloads { display:grid; gap:10px; margin:0 0 18px; }
    .downloads a { margin:0; background:#1C6B42; }
    .hidden { display:none; }
    a { display:inline-flex; margin-top:8px; padding:13px 20px; border-radius:11px; color:#fff; background:#173F2D; text-decoration:none; font-weight:700; font-size:14px; }
    .error .icon { background:#B83A3A; }
    .error .status { color:#8E2929; background:#FCEEEE; }
    @media (max-width:540px) { .card { padding:32px 22px; } }
  </style>
</head>
<body>
  <main id="card" class="card" aria-live="polite">
    <div id="status-icon" class="icon">✓</div>
    <h1 id="status-title">Checking your payment…</h1>
    <p id="status-copy">Please keep this page open for a moment.</p>
    <div id="delivery-status" class="status">Confirming the order with Stripe.</div>
    <div id="download-links" class="downloads hidden"></div>
    <a href="/">Return to BMS Archive</a>
  </main>

  <script>
    const card = document.getElementById('card');
    const icon = document.getElementById('status-icon');
    const title = document.getElementById('status-title');
    const copy = document.getElementById('status-copy');
    const delivery = document.getElementById('delivery-status');
    const downloads = document.getElementById('download-links');
    const sessionId = new URLSearchParams(window.location.search).get('session_id');

    function showError(message) {
      card.classList.add('error');
      icon.textContent = '×';
      title.textContent = 'We could not confirm the order';
      copy.textContent = 'No new payment should be attempted until you have checked your Stripe receipt.';
      delivery.textContent = message;
    }

    async function loadStatus(attempt = 0) {
      if (!sessionId) return showError('The checkout session is missing.');
      try {
        const response = await fetch(`/api/session-status?session_id=${encodeURIComponent(sessionId)}`, { cache: 'no-store' });
        const session = await response.json();
        if (!response.ok) throw new Error(session.error || 'Order status is unavailable.');
        if (session.status !== 'complete' || session.paymentStatus !== 'paid') {
          return showError('The payment has not been completed.');
        }

        title.textContent = 'Payment confirmed';
        copy.textContent = session.email
          ? `Thank you. Your receipt and e-book are being sent to ${session.email}.`
          : 'Thank you. Your receipt and e-book are being sent by email.';

        downloads.replaceChildren();
        (session.products || []).forEach(product => {
          const link = document.createElement('a');
          const params = new URLSearchParams({ session_id: sessionId, product_id: product.id });
          link.href = `/api/download?${params.toString()}`;
          link.textContent = `Download ${product.name}`;
          downloads.appendChild(link);
        });
        downloads.classList.toggle('hidden', downloads.childElementCount === 0);

        if (session.delivered) {
          delivery.textContent = 'Your e-book email has been accepted for delivery. You can also download it here.';
          localStorage.removeItem('bms-ebook-cart');
        } else if (attempt < 5) {
          delivery.textContent = 'Payment received. Preparing your e-book email…';
          window.setTimeout(() => loadStatus(attempt + 1), 2000);
        } else {
          delivery.textContent = 'Payment received. Email delivery is taking a little longer than expected.';
        }
      } catch (error) {
        showError(error.message || 'Order status is unavailable.');
      }
    }

    loadStatus();
  </script>
</body>
</html>
