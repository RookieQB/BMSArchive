# ── HTTP: redirect alt til HTTPS ─────────────────────────────
server {
    listen 80;
    server_name bmsarchive.com www.bmsarchive.com;

    # Let's Encrypt webroot challenge (bruges ved certfornyelse)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: primær server ──────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name bmsarchive.com www.bmsarchive.com;

    ssl_certificate     /etc/letsencrypt/live/bmsarchive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bmsarchive.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/ til Node.js waitlist backend
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # Statiske filer
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Komprimering
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Lang cache til assets, ingen cache til HTML
    location ~* \.(css|js|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Sikkerhedsheaders inkl. HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header X-XSS-Protection           "1; mode=block"                               always;
}
