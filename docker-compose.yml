services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bms-archive
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: bms-api
    volumes:
      - waitlist_data:/data
    restart: unless-stopped

volumes:
  waitlist_data:
