# Rate limiting — 10 MB shared zone, 5 requests/minute per IP
limit_req_zone $binary_remote_addr zone=waitlist:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=checkout:10m rate=10r/m;

# ── HTTP: redirect alt til HTTPS ─────────────────────────────
server {
    listen 80;
    server_name bmsarchive.com www.bmsarchive.com;

    # Let's Encrypt webroot challenge (bruges ved certfornyelse)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: primær server ──────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name bmsarchive.com www.bmsarchive.com;

    ssl_certificate     /etc/letsencrypt/live/bmsarchive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bmsarchive.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /usr/share/nginx/html;
    index index.html;

    # Formular-endpoints har hver sin rate limit.
    location = /api/waitlist {
        limit_req        zone=waitlist burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    location = /api/checkout {
        limit_req        zone=checkout burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 20s;
    }

    # Stripe webhook og statuspolling må ikke dele formularernes lave rate limit.
    location /api/ {

        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # Statiske filer
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Komprimering
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Lang cache til assets — add_header her tilsidesætter server-niveau headers (nginx-arv)
    # X-Content-Type-Options gentages her bevidst for at beskytte JS-filer
    location ~* \.(css|js|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control        "public, immutable"  always;
        add_header X-Content-Type-Options "nosniff"          always;
    }

    # HTML og JSON: brug expires (ikke add_header) så server-niveau sikkerhedsheaders arves
    location = /index.html    { expires -1; }
    location = /checkout-success.html { expires -1; }
    location = /database.html { expires -1; }
    location = /data.json     { expires -1; }

    # Sikkerhedsheaders — gælder alle responses der ikke overskrives af location-blok add_header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://region1.google-analytics.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
}
